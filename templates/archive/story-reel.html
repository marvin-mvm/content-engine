<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Acme — Story / Reel (1080×1920)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1920px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1920px; background: #1A2E1E; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #F2EDE4;">

  <!-- Radial vignette -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 45%, #243a28 0%, #1A2E1E 60%, #0F1A0F 100%);"></div>

  <!-- Top scrim -->
  <div aria-hidden="true" style="position: absolute; top: 0; left: 0; right: 0; height: 540px; background: linear-gradient(to bottom, rgba(10, 20, 12, 0.78) 0%, rgba(10, 20, 12, 0.4) 50%, transparent 100%); pointer-events: none;"></div>

  <!-- Top-right logo badge -->
  <div style="position: absolute; top: 24px; right: 24px; display: flex; flex-direction: column; align-items: center; gap: 6px;">
    <div style="width: 36px; height: 36px; border: 1px solid #3D9E6E; border-radius: 6px; background: rgba(26, 46, 30, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme logomark" style="width: 26px; height: 26px; display: block; object-fit: contain;" />
    </div>
    <span style="font-family: 'DM Mono', monospace; font-size: 7px; letter-spacing: 0.15em; color: #F2EDE4; text-transform: uppercase;">
      ACME LABS
    </span>
  </div>

  <!-- Top-left: eyebrow + headline -->
  <div style="position: absolute; top: 24px; left: 24px; right: 140px; max-width: 880px;">
    <div style="font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: #3D9E6E; margin-bottom: 24px; text-transform: uppercase;">
      {{EYEBROW}}
    </div>
    <h1 style="margin: 0; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 62px; line-height: 1.1; letter-spacing: -0.02em; color: #F2EDE4;">
      <span style="display: block;">{{HOOK_LINE_1}}</span>
      <span style="display: block;">
        <span style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; color: #3D9E6E; font-size: 66px; letter-spacing: -0.01em;">
          {{HOOK_LINE_2_ITALIC}}
        </span>
      </span>
      <span style="display: block;">{{HOOK_LINE_3}}</span>
    </h1>
  </div>

  <!-- Centre subtitle -->
  <div style="position: absolute; bottom: 320px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 60px; text-shadow: 0 1px 10px rgba(0, 0, 0, 0.95);">
    <div style="background: rgba(10, 20, 12, 0.55); border-radius: 14px; padding: 12px 26px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 45px; color: #F2EDE4; text-align: center; line-height: 1.3; max-width: 92%;">
      {{SUBTITLE_TEXT}}
    </div>
  </div>

  <!-- Bottom scrim -->
  <div aria-hidden="true" style="position: absolute; bottom: 0; left: 0; right: 0; height: 210px; background: linear-gradient(to top, rgba(10, 20, 12, 0.9) 0%, rgba(10, 20, 12, 0.5) 50%, transparent 100%); pointer-events: none;"></div>

  <!-- Bottom bar: CTA + handle -->
  <div style="position: absolute; bottom: 90px; left: 24px; right: 24px; display: flex; align-items: center; justify-content: space-between;">
    <div style="background: #2D6A4A; border-radius: 24px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px; color: #F2EDE4; letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 8px;">
      {{CTA_LABEL}}
      <svg width="14" height="8" viewBox="0 0 14 8" style="display: block;">
        <line x1="0" y1="4" x2="12" y2="4" stroke="currentColor" stroke-width="1.2"/>
        <line x1="9" y1="1" x2="12" y2="4" stroke="currentColor" stroke-width="1.2"/>
        <line x1="9" y1="7" x2="12" y2="4" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </div>
    <span style="font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: #7BA086;">
      {{HANDLE}}
    </span>
  </div>

</div>

</body>
</html>
