// Acme brand chrome — palette, slide frame, logomark, icons.
// Exports to window: PALETTE, SlideFrame, Logomark, AccentWord, Chip, ArrowCTA,
//   HairRule, BulletDot, CircleIcon, IconHelix, IconHex, IconCell, IconStrand,
//   IconDroplet, IconClock, IconShield, IconRoute, CornerHelix, CornerHex, CornerCell.

  deepForest:  '#1A2E1E',
  forest:      '#2D6A4A',
  brightGreen: '#3D9E6E',
  sageMint:    '#C8DDD0',
  warmCream:   '#F2EDE4',
  creamWhite:  '#EDE8DF',
  darkBody:    '#1A2820',
  mutedGreen:  '#6B8F7A',
  cardWhite:   '#FFFFFF',
};

// ---------- Logomark — actual Acme leaf+helix PNG (transparent bg) ----------
function Logomark({ size = 28 }) {
  // Source is the Acme logo SVG (viewBox 1088×1408 → aspect ≈ 0.773). Height = `size`, width derived.
  const h = size;
  const w = Math.round(size * 0.773);
  // window.__resources.leafLogo is a blob URL injected by the standalone bundler;
  // falls back to the on-disk path in the normal (non-bundled) project.
  const src = (typeof window !== 'undefined' && window.__resources && window.__resources.leafLogo)
    || '../../assets/acme-logo-icon.svg';
  return (
    <img
      src={src}
      alt="Acme logomark"
      width={w}
      height={h}
      style={{ display: 'block', objectFit: 'contain' }}
    />
  );
}

// ---------- Accent word: Cormorant Garamond Bold Italic, accent green ----------
function AccentWord({ children, color, size, style }) {
  return (
    <span style={{
      fontFamily: "'Cormorant Garamond', 'Cormorant', serif",
      fontStyle: 'italic',
      fontWeight: 700,
      color,
      fontSize: size,
      letterSpacing: '-0.01em',
      ...style,
    }}>{children}</span>
  );
}

// ---------- Chip (pill, outlined accent) ----------
function Chip({ children, color, borderColor, mono = true, style }) {
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      padding: '6px 14px',
      border: `1px solid ${borderColor || color}`,
      borderRadius: 999,
      color,
      fontFamily: mono ? "'DM Mono', monospace" : "'DM Sans', sans-serif",
      fontSize: 11,
      letterSpacing: '0.22em',
      textTransform: 'uppercase',
      lineHeight: 1,
      ...style,
    }}>{children}</span>
  );
}

// ---------- ArrowCTA — "LABEL →" tracked mono ----------
function ArrowCTA({ children, color, size = 13, style }) {
  return (
    <span style={{
      display: 'inline-flex',
      alignItems: 'center',
      gap: 10,
      fontFamily: "'DM Mono', monospace",
      fontSize: size,
      letterSpacing: '0.28em',
      color,
      textTransform: 'uppercase',
      ...style,
    }}>
      {children}
      <svg width="22" height="10" viewBox="0 0 22 10" style={{ display: 'block' }}>
        <line x1="0" y1="5" x2="20" y2="5" stroke={color} strokeWidth="1"/>
        <line x1="15" y1="1" x2="20" y2="5" stroke={color} strokeWidth="1"/>
        <line x1="15" y1="9" x2="20" y2="5" stroke={color} strokeWidth="1"/>
      </svg>
    </span>
  );
}

function HairRule({ color, opacity = 1, style }) {
  return <div style={{ height: 1, background: color, opacity, ...style }}/>;
}

// ---------- Circular outline icons (thin, scientific) ----------
function CircleIcon({ size = 56, color, stroke = 1, children, style }) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: '50%',
      border: `${stroke}px solid ${color}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0,
      ...style,
    }}>
      <svg width={size * 0.55} height={size * 0.55} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    </div>
  );
}

// ---------- Larger corner illustrations (decorative) ----------
function CornerHelix({ color, size = 140, opacity = 0.4 }) {
  // pair of dotted helix curves
  return (
    <svg width={size} height={size * 1.4} viewBox="0 0 100 140" style={{ display: 'block', opacity }}>
      {Array.from({ length: 12 }).map((_, i) => {
        const y = 6 + i * 11;
        const x1 = 50 + Math.sin(i * 0.55) * 26;
        const x2 = 50 - Math.sin(i * 0.55) * 26;
        return <g key={i}>
          <circle cx={x1} cy={y} r="2" fill={color}/>
          <circle cx={x2} cy={y} r="2" fill={color}/>
          <line x1={x1} y1={y} x2={x2} y2={y} stroke={color} strokeWidth="0.6" opacity="0.6"/>
        </g>;
      })}
    </svg>
  );
}

function CornerHex({ color, size = 160, opacity = 0.45 }) {
  // honeycomb of 7 hexes
  const hex = (cx, cy, r) => {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      pts.push(`${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
    }
    return pts.join(' ');
  };
  const r = 18;
  const h = r * Math.sqrt(3);
  const centers = [
    [80, 80], [80 - 1.5 * r, 80 - h/2], [80 + 1.5 * r, 80 - h/2],
    [80 - 1.5 * r, 80 + h/2], [80 + 1.5 * r, 80 + h/2],
    [80, 80 - h], [80, 80 + h],
  ];
  return (
    <svg width={size} height={size} viewBox="0 0 160 160" style={{ display: 'block', opacity }}>
      {centers.map(([cx, cy], i) => (
        <polygon key={i} points={hex(cx, cy, r)} fill="none" stroke={color} strokeWidth="0.8"/>
      ))}
    </svg>
  );
}

function CornerCell({ color, size = 150, opacity = 0.5 }) {
  // concentric circles + dots
  return (
    <svg width={size} height={size} viewBox="0 0 150 150" style={{ display: 'block', opacity }}>
      <circle cx="75" cy="75" r="64" fill="none" stroke={color} strokeWidth="0.7"/>
      <circle cx="75" cy="75" r="44" fill="none" stroke={color} strokeWidth="0.7"/>
      <circle cx="75" cy="75" r="24" fill="none" stroke={color} strokeWidth="0.9"/>
      <circle cx="75" cy="75" r="6" fill={color}/>
      {[0, 72, 144, 216, 288].map((deg, i) => {
        const rad = (deg * Math.PI) / 180;
        const x = 75 + Math.cos(rad) * 44;
        const y = 75 + Math.sin(rad) * 44;
        return <circle key={i} cx={x} cy={y} r="2.5" fill={color}/>;
      })}
    </svg>
  );
}

function CornerMolecule({ color, size = 160, opacity = 0.5 }) {
  // 6 nodes connected in ring + central node
  const nodes = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i;
    nodes.push([80 + Math.cos(a) * 50, 80 + Math.sin(a) * 50]);
  }
  return (
    <svg width={size} height={size} viewBox="0 0 160 160" style={{ display: 'block', opacity }}>
      {nodes.map(([x1, y1], i) => {
        const [x2, y2] = nodes[(i + 1) % 6];
        return <line key={'r'+i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth="0.7"/>;
      })}
      {nodes.map(([x, y], i) => (
        <g key={'l'+i}>
          <line x1="80" y1="80" x2={x} y2={y} stroke={color} strokeWidth="0.5" opacity="0.5"/>
          <circle cx={x} cy={y} r="4" fill="none" stroke={color} strokeWidth="0.9"/>
        </g>
      ))}
      <circle cx="80" cy="80" r="5" fill={color}/>
    </svg>
  );
}

// ---------- Large editorial corner network — dense dotted graph (brain/molecule motif) ----------
function CornerNetwork({ color = '#3D9E6E', size = 460, opacity = 0.55, seed = 7 }) {
  function rand(i) { return (Math.sin(i * 99.7 + seed * 13.3) * 43758.5453) % 1; }
  const N = 38;
  const nodes = [];
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2 + rand(i) * 0.6;
    const r = 0.35 + rand(i * 2) * 0.6;
    const cx = 230 + Math.cos(t) * 130 * r + (rand(i * 3) - 0.5) * 40;
    const cy = 240 + Math.sin(t) * 150 * r + (rand(i * 5) - 0.5) * 40;
    nodes.push([cx, cy]);
  }
  const edges = [];
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = nodes[i][0] - nodes[j][0], dy = nodes[i][1] - nodes[j][1];
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 70) edges.push([i, j, d]);
    }
  }
  return (
    <svg width={size} height={size} viewBox="0 0 460 460" style={{ display: 'block', opacity }}>
      {edges.map(([i, j, d], k) => (
        <line key={k}
          x1={nodes[i][0]} y1={nodes[i][1]}
          x2={nodes[j][0]} y2={nodes[j][1]}
          stroke={color} strokeWidth="0.6"
          opacity={0.35 - (d / 70) * 0.2}/>
      ))}
      {nodes.map(([x, y], i) => (
        <g key={'n' + i}>
          <circle cx={x} cy={y} r={1.6 + (i % 5 === 0 ? 1.6 : 0)} fill={color}
            opacity={i % 5 === 0 ? 1 : 0.85}/>
          {i % 7 === 0 && (
            <circle cx={x} cy={y} r="5" fill="none" stroke={color} strokeWidth="0.6" opacity="0.5"/>
          )}
        </g>
      ))}
    </svg>
  );
}

      window.TList,  window.TComparison, window.TQuote, window.TRUO, window.TOutro,
    ];

    function App() {
      return (
        <>
          {TEMPLATES.map((Comp, i) => (
            <div className="slide-wrap" key={i}>
              <Comp number={i + 1} total={10} mode="light" brand="labs" showIllustration={true}/>
            </div>
          ))}
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('stack')).render(<App/>);

    // Scale stacked slides to fit narrow viewports (preview aid only —
    // the artwork stays native 1080×1350).
    function fitStack() {
      const wraps = document.querySelectorAll('.slide-wrap');
      const avail = Math.min(window.innerWidth - 48, 1080);
      const s = avail / 1080;
      wraps.forEach(w => {
        w.style.transform = `scale(${s})`;
        w.style.height = (1350 * s) + 'px';
        w.style.marginBottom = (1350 * s - 1350) + 'px';
      });
    }
    window.addEventListener('resize', fitStack);
    setTimeout(fitStack, 400);
  </script>


</body></html>
