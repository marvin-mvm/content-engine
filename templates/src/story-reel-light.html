<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Acme — Story / Reel Light (1080×1920 native)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1920px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1920px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820;">

  <!-- Radial vignette (cream → sage mint) -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 45%, #F2EDE4 0%, #DCE6D7 60%, #C8DDD0 100%);"></div>

  <!-- Top scrim -->
  <div aria-hidden="true" style="position: absolute; top: 0; left: 0; right: 0; height: 540px; background: linear-gradient(to bottom, rgba(242, 237, 228, 0.85) 0%, rgba(242, 237, 228, 0.45) 50%, transparent 100%); pointer-events: none;"></div>

  <!-- Top-right logo badge -->
  <div style="position: absolute; top: 60px; right: 60px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
    <div style="width: 96px; height: 96px; border: 2px solid #3D9E6E; border-radius: 14px; background: rgba(242, 237, 228, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 60px; height: 60px; object-fit: contain;" />
    </div>
    <span style="font-family: 'DM Mono', monospace; font-size: 16px; letter-spacing: 0.15em; color: #1A2820; text-transform: uppercase;">{{BRAND_NAME}}</span>
  </div>

  <!-- Hook zone: eyebrow + headline. BOUNDED (bottom + overflow) so a long hook can never grow
       down into the centre subtitle — clips instead of colliding (mirrors the carousel flow fix). -->
  <div style="position: absolute; top: 80px; left: 60px; right: 280px; bottom: 720px; overflow: hidden;">
    <div style="font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.2em; color: #3D9E6E; margin-bottom: 40px; text-transform: uppercase;">{{EYEBROW}}</div>
    <h1 style="margin: 0; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 88px; line-height: 1.1; letter-spacing: -0.02em; color: #1A2820;">
      <span style="display: block;">{{HOOK_LINE_1}}</span>
      <span style="display: block; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; color: #3D9E6E; font-size: 96px; letter-spacing: -0.01em;">{{HOOK_LINE_2_ITALIC}}</span>
      <span style="display: block;">{{HOOK_LINE_3}}</span>
    </h1>
  </div>

  <!-- Centre subtitle -->
  <div style="position: absolute; bottom: 450px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; padding: 0 80px; text-shadow: 0 2px 10px rgba(242, 237, 228, 0.9);">
    <div style="background: rgba(242, 237, 228, 0.85); border-radius: 20px; padding: 24px 40px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 55px; color: #1A2820; text-align: center; line-height: 1.3; border: 1px solid rgba(45, 106, 74, 0.22);">
      {{SUBTITLE_TEXT}}
    </div>
  </div>

  <!-- Bottom scrim -->
  <div aria-hidden="true" style="position: absolute; bottom: 0; left: 0; right: 0; height: 350px; background: linear-gradient(to top, rgba(242, 237, 228, 0.9) 0%, rgba(242, 237, 228, 0.5) 50%, transparent 100%); pointer-events: none;"></div>

  <!-- Bottom bar: CTA + handle -->
  <div style="position: absolute; bottom: 120px; left: 60px; right: 60px; display: flex; align-items: center; justify-content: space-between;">
    <div style="background: #2D6A4A; border-radius: 40px; padding: 20px 40px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 32px; color: #F2EDE4; letter-spacing: 0.04em;">
      {{CTA_LABEL}} →
    </div>
    <span style="font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.18em; color: #6B8F7A;">{{HANDLE}}</span>
  </div>

</div>

</body>
</html>
