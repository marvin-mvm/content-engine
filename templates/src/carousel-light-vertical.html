<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Acme — Carousel Slide (Light, 1080×1920 vertical / TikTok)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1920px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1920px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820;">

  <!-- Radial wash -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 95% 60% at 50% 42%, #F2EDE4 0%, #DCE6D7 62%, #C8DDD0 100%);"></div>

  <!-- Slide number (top-left) + green underline -->
  <div style="position: absolute; top: 96px; left: 84px;">
    <span style="font-family: 'DM Mono', monospace; font-size: 28px; letter-spacing: 0.1em; color: #2D6A4A;">{{SLIDE_NUM}} / {{SLIDE_TOTAL}}</span>
    <div aria-hidden="true" style="margin-top: 10px; width: 46px; height: 3px; background: #3D9E6E;"></div>
  </div>

  <!-- Brand (top-right) -->
  <div style="position: absolute; top: 90px; right: 84px; display: flex; align-items: center; gap: 16px;">
    <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.14em; color: #1A2820; text-transform: uppercase;">{{BRAND_NAME}}</span>
    <div style="width: 70px; height: 70px; border: 2px solid #2D6A4A; border-radius: 14px; background: rgba(242, 237, 228, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 44px; height: 44px; object-fit: contain;" />
    </div>
  </div>

  <!-- Content column, VERTICALLY CENTERED in the tall frame. eyebrow → headline → hairline → body;
       overflow clips a very long body instead of colliding with the footer. -->
  <div style="position: absolute; top: 260px; left: 84px; right: 84px; bottom: 300px; display: flex; flex-direction: column; justify-content: center; overflow: hidden;">
    <div style="font-family: 'DM Mono', monospace; font-size: 26px; letter-spacing: 0.24em; color: #2D6A4A; text-transform: uppercase;">{{EYEBROW}}</div>

    <h1 style="margin: 26px 0 0 0; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 88px; line-height: 1.07; letter-spacing: -0.02em; color: #1A2820;">
      <span style="display: block;">{{HEAD_1}}</span>
      <span style="display: block; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; color: #3D9E6E; font-size: 98px;">{{HEAD_2_ITALIC}}</span>
      <span style="display: block;">{{HEAD_3}}</span>
    </h1>

    <div aria-hidden="true" style="margin: 36px 0; height: 1px; background: rgba(45,106,74,0.25);"></div>

    <div style="font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 44px; line-height: 1.5; color: #1A2820;">{{BODY}}</div>
  </div>

  <!-- Footer: swipe indicator + handle -->
  <div style="position: absolute; bottom: 120px; left: 84px; right: 84px; display: flex; align-items: center; justify-content: space-between;">
    <span style="font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.14em; color: #6B8F7A; text-transform: uppercase;">{{SWIPE_LABEL}}</span>
    <span style="font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.18em; color: #2D6A4A;">{{HANDLE}}</span>
  </div>

</div>

</body>
</html>
