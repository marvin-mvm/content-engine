<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <title>Acme — Product-Use Light (1080×1350)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { width: 1080px; height: 1350px; overflow: hidden; }</style>
</head>
<body>
<div style="position: relative; width: 1080px; height: 1350px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820; display: flex; flex-direction: column;">
  <!-- vignette -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 75% 60% at 50% 42%, #F2EDE4 0%, #DCE6D7 62%, #C8DDD0 100%);"></div>

  <!-- header -->
  <div style="position: relative; display: flex; align-items: center; justify-content: space-between; padding: 46px 60px 0;">
    <span style="font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.2em; color: #2D6A4A; text-transform: uppercase;">{{BRAND_NAME}}</span>
    <div style="width: 64px; height: 64px; border: 2px solid #3D9E6E; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(242,237,228,0.85);">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 40px; height: 40px; object-fit: contain;" />
    </div>
  </div>

  <!-- eyebrow + compound -->
  <div style="position: relative; text-align: center; margin-top: 22px;">
    <div style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.26em; color: #3D9E6E; text-transform: uppercase;">{{EYEBROW}}</div>
    <div style="font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 62px; letter-spacing: -0.02em; color: #1A2820; margin-top: 8px;">{{COMPOUND}}</div>
  </div>

  <!-- centered product image -->
  <div style="position: relative; flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 0;">
    <img src="{{PRODUCT_IMAGE}}" alt="" style="max-height: 440px; max-width: 66%; object-fit: contain; filter: drop-shadow(0 26px 50px rgba(26,40,32,0.22));" />
  </div>

  <!-- description BELOW the image -->
  <div style="position: relative; text-align: center; padding: 0 96px;">
    <div style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; font-size: 46px; color: #2D6A4A; line-height: 1.2;">{{DESCRIPTOR}}</div>
    <div style="font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 31px; color: #1A2820; line-height: 1.42; margin-top: 18px;">{{DESCRIPTION}}</div>
  </div>

  <!-- spec chips -->
  <div style="position: relative; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; padding: 26px 60px 0;">
    <span style="background: rgba(45,106,74,0.12); border: 1px solid rgba(45,106,74,0.3); border-radius: 30px; padding: 11px 26px; font-family: 'DM Mono', monospace; font-size: 21px; letter-spacing: 0.06em; color: #2D6A4A;">{{SPEC1}}</span>
    <span style="background: rgba(45,106,74,0.12); border: 1px solid rgba(45,106,74,0.3); border-radius: 30px; padding: 11px 26px; font-family: 'DM Mono', monospace; font-size: 21px; letter-spacing: 0.06em; color: #2D6A4A;">{{SPEC2}}</span>
  </div>

  <!-- footer -->
  <div style="position: relative; display: flex; align-items: center; justify-content: space-between; padding: 28px 60px 42px;">
    <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.1em; color: #6B8F7A;">{{RUO_LINE}}</span>
    <span style="font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.18em; color: #2D6A4A;">{{HANDLE}}</span>
  </div>
</div>
</body>
</html>
