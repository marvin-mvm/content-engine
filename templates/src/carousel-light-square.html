<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1080" />
  <title>Acme — Carousel Slide (Light, 1080×1080 square / X)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1080px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820;">

  <!-- Radial wash -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 90% 80% at 50% 38%, #F2EDE4 0%, #DCE6D7 60%, #C8DDD0 100%);"></div>

  <!-- Slide number (top-left) + green underline -->
  <div style="position: absolute; top: 52px; left: 72px;">
    <span style="font-family: 'DM Mono', monospace; font-size: 24px; letter-spacing: 0.1em; color: #2D6A4A;">{{SLIDE_NUM}} / {{SLIDE_TOTAL}}</span>
    <div aria-hidden="true" style="margin-top: 8px; width: 40px; height: 2px; background: #3D9E6E;"></div>
  </div>

  <!-- Brand (top-right) -->
  <div style="position: absolute; top: 48px; right: 72px; display: flex; align-items: center; gap: 14px;">
    <span style="font-family: 'DM Mono', monospace; font-size: 16px; letter-spacing: 0.14em; color: #1A2820; text-transform: uppercase;">{{BRAND_NAME}}</span>
    <div style="width: 58px; height: 58px; border: 2px solid #2D6A4A; border-radius: 12px; background: rgba(242, 237, 228, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 36px; height: 36px; object-fit: contain;" />
    </div>
  </div>

  <!-- Content column: eyebrow → headline → hairline → body flow top-down; overflow clips a long
       body instead of colliding with the footer. Compressed frame for the 1080² square. -->
  <div style="position: absolute; top: 158px; left: 72px; right: 72px; bottom: 180px; overflow: hidden;">
    <div style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.24em; color: #2D6A4A; text-transform: uppercase;">{{EYEBROW}}</div>

    <h1 style="margin: 20px 0 0 0; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 70px; line-height: 1.07; letter-spacing: -0.02em; color: #1A2820;">
      <span style="display: block;">{{HEAD_1}}</span>
      <span style="display: block; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; color: #3D9E6E; font-size: 78px;">{{HEAD_2_ITALIC}}</span>
      <span style="display: block;">{{HEAD_3}}</span>
    </h1>

    <div aria-hidden="true" style="margin: 26px 0; height: 1px; background: rgba(45,106,74,0.25);"></div>

    <div style="font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 35px; line-height: 1.46; color: #1A2820;">{{BODY}}</div>
  </div>

  <!-- Footer: swipe indicator + handle -->
  <div style="position: absolute; bottom: 100px; left: 72px; right: 72px; display: flex; align-items: center; justify-content: space-between;">
    <span style="font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.14em; color: #6B8F7A; text-transform: uppercase;">{{SWIPE_LABEL}}</span>
    <span style="font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 0.18em; color: #2D6A4A;">{{HANDLE}}</span>
  </div>

  <!-- Persistent Waitlist banner — MANDATORY on the bottom of EVERY slide (brand rule).
       The visible URL is the on-image CTA; the clickable link lives in every caption. -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 76px; background: #1A2E1E; display: flex; align-items: center; justify-content: center; gap: 18px;">
    <span style="font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 0.16em; color: #F2EDE4; text-transform: uppercase;">Join the Waitlist</span>
    <span aria-hidden="true" style="width: 7px; height: 7px; border-radius: 50%; background: #3D9E6E; opacity: 1;"></span>
    <span style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.03em; color: #9FBFAC;">acmelabs.co/waitlist</span>
  </div>


</div>

</body>
</html>
