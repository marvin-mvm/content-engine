<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=2560, height=1440" />
  <title>ACME Labs — youtube cover (2560x1440)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 2560px; height: 1440px; overflow: hidden; }
  </style>
</head>
<body>
<div style="position: relative; width: 2560px; height: 1440px; background: #1A2E1E; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #F2EDE4;">

  <!-- Radial wash (brand dark DNA) -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 80% 90% at 50% 46%, #243a28 0%, #1A2E1E 55%, #0F1A0F 100%);"></div>

  <!-- Centred brand lockup -->
  <div style="position: absolute; inset: 0; padding: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <div style="max-width: 1400px; display: flex; flex-direction: column; align-items: center;">

      <!-- Logo chip (cream so the mark reads crisp on dark) -->
      <div style="width: 168px; height: 168px; border: 2px solid #3D9E6E; border-radius: 29px; background: rgba(242, 237, 228, 0.94); display: flex; align-items: center; justify-content: center;">
        <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 103px; height: 103px; object-fit: contain;" />
      </div>

      <!-- Wordmark -->
      <div style="margin-top: 29px; font-family: 'DM Mono', monospace; font-size: 34px; letter-spacing: 0.36em; color: #F2EDE4; text-transform: uppercase;">ACME&nbsp;LABS</div>

      <!-- Accent hairline -->
      <div aria-hidden="true" style="margin: 31px 0 31px 0; width: 94px; height: 2px; background: #3D9E6E;"></div>

      <!-- Tagline -->
      <div style="font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 34px; line-height: 1.3; letter-spacing: 0.02em; color: #C9D6CC;">Advancing scientific research through</div>
      <div style="margin-top: 9px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; font-size: 54px; line-height: 1.1; color: #3D9E6E;">quality &amp; transparency</div>

    </div>
  </div>

</div>
</body>
</html>
