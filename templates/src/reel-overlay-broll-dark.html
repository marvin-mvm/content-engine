<style>
  /* ACME REEL — video CONTAINED in the template window; caption OUTSIDE it.
     Window = the design's .placeholder box: top:20% left:18% right:18% bottom:20%
     (= 692×1152 at 194,384 on a 1080×1920 frame). produce.py composites the video
     INTO that box; the box-shadow paints the brand band everywhere else. */
  :root{--band:#1A2E1E;--text:#F2EDE4;--accent:#3D9E6E;--forest:#2D6A4A;--muted:#7BA086;--sub:rgba(242,237,228,0.82);}
  *{box-sizing:border-box;}
  html,body{margin:0;background:transparent;height:100%;}
  .fit{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .reel{position:relative;width:1080px;height:1920px;background:transparent;overflow:hidden;
    font-family:'DM Sans',sans-serif;color:var(--text);}
  /* the transparent video window (a rounded hole); box-shadow fills the band around it */
  .window{position:absolute;top:25%;left:18%;right:18%;bottom:20%;border-radius:22px;
    border:2px solid var(--accent);box-shadow:0 0 0 2400px var(--band);}
  /* brand badge top-right */
  .logo{position:absolute;top:44px;right:44px;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .logo .box{width:89px;height:89px;border:2px solid var(--accent);border-radius:17px;
    display:flex;align-items:center;justify-content:center;}
  .logo .box img{height:55px;width:auto;display:block;}
  .logo .wm{font-family:'DM Mono',monospace;font-size:16px;letter-spacing:0.14em;color:var(--text);text-transform:uppercase;}
  /* HOOK — top band, ABOVE the video */
  .hook{position:absolute;top:56px;left:56px;right:210px;z-index:2;}
  .hook .eyebrow{font-family:'DM Mono',monospace;font-size:26px;letter-spacing:0.2em;color:var(--accent);
    margin-bottom:22px;text-transform:uppercase;}
  .hook h1{margin:0;font-weight:700;font-size:74px;line-height:1.06;letter-spacing:-0.02em;color:var(--text);}
  .hook h1 .em{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:80px;color:var(--accent);}
  /* SUBTITLE — bottom band, BELOW the video */
  .subs{position:absolute;bottom:236px;left:56px;right:56px;z-index:2;text-align:center;}
  .subs .line{font-weight:600;font-size:42px;color:var(--text);line-height:1.3;}
  .subs .line .em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--accent);}
  /* CTA — bottom band */
  .cta{position:absolute;bottom:96px;left:56px;right:56px;z-index:2;display:flex;align-items:center;justify-content:space-between;}
  .cta .pill{background:var(--forest);border-radius:44px;padding:22px 44px;font-weight:700;font-size:32px;
    color:#F2EDE4;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:12px;}
  .cta .handle{font-family:'DM Mono',monospace;font-size:26px;letter-spacing:0.16em;color:var(--muted);}
</style>
</head>
<body>
  <div class="fit"><div class="scaler">
  <div class="reel">
    <div class="window"></div>
    <div class="logo">
      <div class="box"><img src="../../assets/acme-logo-icon.svg" alt="Acme"></div>
      <div class="wm">{{BRAND_NAME}}</div>
    </div>
    <div class="hook">
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1>{{HOOK_LINE_1}}<br><span class="em">{{HOOK_LINE_2_ITALIC}}</span><br>{{HOOK_LINE_3}}</h1>
    </div>
    <div class="subs"><div class="line">{{SUBTITLE_TEXT}}</div></div>
    <div class="cta">
      <div class="pill">{{CTA_LABEL}}
        <svg width="26" height="14" viewBox="0 0 22 10"><line x1="0" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="1.6"></line><line x1="13" y1="1" x2="18" y2="5" stroke="currentColor" stroke-width="1.6"></line><line x1="13" y1="9" x2="18" y2="5" stroke="currentColor" stroke-width="1.6"></line></svg>
      </div>
      <div class="handle">{{HANDLE}}</div>
    </div>
  </div>
  </div></div>
</body>
