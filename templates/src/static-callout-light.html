<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1080" />
  <title>Acme — Static Data Callout (Light, 1080×1080)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1080px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820;">

  <!-- Radial wash -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 80% 70% at 50% 45%, #F2EDE4 0%, #DCE6D7 60%, #C8DDD0 100%);"></div>

  <!-- Brand bar (top-left) -->
  <div style="position: absolute; top: 56px; left: 64px; display: flex; align-items: center; gap: 16px;">
    <div style="width: 56px; height: 56px; border: 2px solid #2D6A4A; border-radius: 10px; background: rgba(242, 237, 228, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-leaf.svg" alt="Acme" style="width: 34px; height: 34px; object-fit: contain;" />
    </div>
    <div style="display: flex; flex-direction: column; gap: 3px;">
      <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.16em; color: #1A2820; text-transform: uppercase;">{{BRAND_NAME}}</span>
      <span style="font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: #2D6A4A; text-transform: uppercase;">{{TAGLINE}}</span>
    </div>
  </div>

  <!-- Eyebrow -->
  <div style="position: absolute; top: 300px; left: 0; right: 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.28em; color: #2D6A4A; text-transform: uppercase;">{{EYEBROW}}</div>

  <!-- Hairline above stat -->
  <div aria-hidden="true" style="position: absolute; top: 360px; left: 50%; width: 90px; height: 1px; background: #3D9E6E; transform: translateX(-50%);"></div>

  <!-- The stat -->
  <div style="position: absolute; top: 390px; left: 0; right: 0; text-align: center; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 200px; line-height: 1; color: #1A2820; letter-spacing: -0.02em;">{{STAT}}</div>

  <!-- Stat label -->
  <div style="position: absolute; top: 620px; left: 0; right: 0; text-align: center; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 44px; color: #1A2820;">{{STAT_LABEL}}</div>

  <!-- Hairline below -->
  <div aria-hidden="true" style="position: absolute; top: 700px; left: 50%; width: 90px; height: 1px; background: #3D9E6E; transform: translateX(-50%);"></div>

  <!-- Source citation -->
  <div style="position: absolute; top: 740px; left: 140px; right: 140px; text-align: center; font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: #2D6A4A; font-style: italic;">{{SOURCE}}</div>

  <!-- Bottom bar: RUO + handle -->
  <div style="position: absolute; bottom: 64px; left: 64px; right: 64px; display: flex; align-items: center; justify-content: space-between;">
    <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.16em; color: #2D6A4A; border: 1px solid rgba(45,106,74,0.4); border-radius: 999px; padding: 8px 18px;">{{RUO_LINE}}</span>
    <span style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.18em; color: #2D6A4A;">{{HANDLE}}</span>
  </div>

</div>

</body>
</html>
