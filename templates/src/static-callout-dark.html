<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1080" />
  <title>Acme — Static Data Callout (Dark, 1080×1080)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1080px; height: 1080px; overflow: hidden; }
  </style>
</head>
<body>

<div style="position: relative; width: 1080px; height: 1080px; background: #1A2E1E; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #F2EDE4;">

  <!-- Radial vignette -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 80% 70% at 50% 45%, #243a28 0%, #1A2E1E 60%, #0F1A0F 100%);"></div>

  <!-- Brand bar (top-left) -->
  <div style="position: absolute; top: 56px; left: 64px; display: flex; align-items: center; gap: 16px;">
    <div style="width: 67px; height: 67px; border: 2px solid #3D9E6E; border-radius: 12px; background: rgba(26, 46, 30, 0.85); display: flex; align-items: center; justify-content: center;">
      <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 41px; height: 41px; object-fit: contain;" />
    </div>
    <div style="display: flex; flex-direction: column; gap: 3px;">
      <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.16em; color: #F2EDE4; text-transform: uppercase;">{{BRAND_NAME}}</span>
      <span style="font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: #7BA086; text-transform: uppercase;">{{TAGLINE}}</span>
    </div>
  </div>

  <!-- Eyebrow -->
  <div style="position: absolute; top: 300px; left: 0; right: 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.28em; color: #3D9E6E; text-transform: uppercase;">{{EYEBROW}}</div>

  <!-- Hairline above stat -->
  <div aria-hidden="true" style="position: absolute; top: 360px; left: 50%; width: 90px; height: 1px; background: #3D9E6E; transform: translateX(-50%);"></div>

  <!-- The stat -->
  <div style="position: absolute; top: 390px; left: 0; right: 0; text-align: center; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 200px; line-height: 1; color: #F2EDE4; letter-spacing: -0.02em;">{{STAT}}</div>

  <!-- Stat label -->
  <div style="position: absolute; top: 620px; left: 0; right: 0; text-align: center; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 44px; color: #F2EDE4;">{{STAT_LABEL}}</div>

  <!-- Hairline below -->
  <div aria-hidden="true" style="position: absolute; top: 700px; left: 50%; width: 90px; height: 1px; background: #3D9E6E; transform: translateX(-50%);"></div>

  <!-- Source citation -->
  <div style="position: absolute; top: 740px; left: 140px; right: 140px; text-align: center; font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: #C8DDD0; font-style: italic;">{{SOURCE}}</div>

  <!-- Bottom bar: RUO + handle -->
  <div style="position: absolute; bottom: 104px; left: 64px; right: 64px; display: flex; align-items: center; justify-content: space-between;">
    <span style="font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 0.16em; color: #6B8F7A; border: 1px solid rgba(61,158,110,0.4); border-radius: 999px; padding: 8px 18px;">{{RUO_LINE}}</span>
    <span style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.18em; color: #7BA086;">{{HANDLE}}</span>
  </div>

  <!-- Persistent Waitlist banner — MANDATORY on the bottom of EVERY post (brand rule).
       Visible URL = on-image CTA; the clickable link lives in every caption. -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 76px; background: #3D9E6E; display: flex; align-items: center; justify-content: center; gap: 18px;">
    <span style="font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 0.16em; color: #0F1A0F; text-transform: uppercase;">Join the Waitlist</span>
    <span aria-hidden="true" style="width: 7px; height: 7px; border-radius: 50%; background: #0F1A0F; opacity: 0.5;"></span>
    <span style="font-family: 'DM Mono', monospace; font-size: 22px; letter-spacing: 0.03em; color: #0F1A0F;">acmelabs.co/waitlist</span>
  </div>


</div>

</body>
</html>
