<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1640, height=624" />
  <title>ACME Labs — facebook cover light (1640x624)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 1640px; height: 624px; overflow: hidden; }
  </style>
</head>
<body>
<div style="position: relative; width: 1640px; height: 624px; background: #F2EDE4; overflow: hidden; font-family: 'DM Sans', sans-serif; color: #1A2820;">

  <!-- Radial cream wash (welcome-post DNA) -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 80% 90% at 50% 46%, #F2EDE4 0%, #DCE6D7 60%, #C8DDD0 100%);"></div>

  <!-- Centred brand lockup -->
  <div style="position: absolute; inset: 0; padding: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <div style="max-width: 1345px; display: flex; flex-direction: column; align-items: center;">

      <!-- Logo chip -->
      <div style="width: 150px; height: 150px; border: 2px solid #2D6A4A; border-radius: 26px; background: rgba(242, 237, 228, 0.85); display: flex; align-items: center; justify-content: center;">
        <img src="../../assets/acme-logo-icon.svg" alt="Acme" style="width: 92px; height: 92px; object-fit: contain;" />
      </div>

      <!-- Wordmark -->
      <div style="margin-top: 26px; font-family: 'DM Mono', monospace; font-size: 30px; letter-spacing: 0.36em; color: #1A2820; text-transform: uppercase;">ACME&nbsp;LABS</div>

      <!-- Accent hairline -->
      <div aria-hidden="true" style="margin: 28px 0 28px 0; width: 84px; height: 2px; background: #3D9E6E;"></div>

      <!-- Tagline -->
      <div style="font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 30px; line-height: 1.3; letter-spacing: 0.02em; color: #2E4A38;">Advancing scientific research through</div>
      <div style="margin-top: 8px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; font-size: 48px; line-height: 1.1; color: #2D6A4A;">quality &amp; transparency</div>

    </div>
  </div>

</div>
</body>
</html>
