<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #1a2e1e;
      }
      #bg-video {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* Composition-level contrast scrim (design.md: Deep Forest, kept OUT of the
         reusable caption component). Bottom gradient keeps cream captions legible
         over bright footage. */
      #scrim {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        background: linear-gradient(
          to bottom,
          rgba(10, 20, 12, 0) 40%,
          rgba(10, 20, 12, 0.34) 58%,
          rgba(10, 20, 12, 0.62) 72%,
          rgba(10, 20, 12, 0.84) 100%
        );
      }
      #captions {
        position: absolute;
        inset: 0;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <!--
      ACME-007 — A1 pipeline validation. Nova product review (1080x1920 portrait),
      Whisper-timed editorial-emphasis captions burned over the source footage.
      Background video + its audio track live here at the root; the caption
      component is a transparent overlay.
    -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15.09"
      data-width="1080"
      data-height="1920"
    >
      <video
        id="bg-video"
        src="input.mp4"
        muted
        playsinline
        preload="auto"
        data-start="0"
        data-duration="15.09"
        data-track-index="0"
        data-has-audio="false"
      ></video>

      <audio
        id="bg-audio"
        src="input.mp4"
        data-start="0"
        data-duration="15.09"
        data-track-index="1"
        data-volume="1"
      ></audio>

      <div id="scrim"></div>

      <div
        id="captions"
        class="clip"
        data-composition-id="caption-editorial-emphasis"
        data-start="0"
        data-duration="15.09"
        data-track-index="2"
        data-composition-src="compositions/components/caption-editorial-emphasis.html"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
